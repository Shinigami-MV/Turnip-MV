name: Build Turnip MV

on:
  workflow_dispatch:
    inputs:
      mesa_ref:
        description: "Mesa tag, branch or commit"
        required: true
        default: "mesa-26.1.0"

      build_name:
        description: "Name shown in Winlator / AdrenoTools"
        required: true
        default: "Turnip MV POCO F6 A735 - Baseline R1"

  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-turnip.yml"
      - "scripts/**"
      - "patches/**"

permissions:
  contents: read

jobs:
  build:
    name: Build Android ARM64 driver
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install host build tools
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            git \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            ninja-build \
            meson \
            pkg-config \
            ccache \
            bison \
            flex \
            glslang-tools \
            spirv-tools \
            libexpat1-dev \
            libzstd-dev \
            zlib1g-dev \
            libssl-dev

          python3 -m pip install \
            --user \
            --upgrade \
            meson \
            mako \
            pyyaml \
            packaging

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Android NDK
        shell: bash
        run: |
          set -euxo pipefail

          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            --licenses >/dev/null || true

          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "ndk;28.2.13676358"

          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/28.2.13676358" \
            >> "$GITHUB_ENV"

      - name: Clone Mesa
        shell: bash
        run: |
          set -euxo pipefail

         
