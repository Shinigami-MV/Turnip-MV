name: Build Turnip MV Eclipse

on:
  workflow_dispatch:
    inputs:
      mesa_ref:
        description: "Mesa tag, branch or commit"
        required: true
        default: "mesa-26.1.4"

      build_name:
        description: "Driver name shown in Winlator"
        required: true
        default: "Turnip MV Eclipse R2"

  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-turnip.yml"
      - "scripts/**"
      - "patches/**"

permissions:
  contents: read

jobs:
  build:
    name: Build Eclipse R2 Android ARM64
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install host build tools
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update

          sudo apt-get install -y \
            git \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            ninja-build \
            meson \
            pkg-config \
            ccache \
            bison \
            flex \
            glslang-tools \
            spirv-tools \
            libexpat1-dev \
            libzstd-dev \
            zlib1g-dev \
            libssl-dev

          python3 -m pip install \
            --user \
            --upgrade \
            meson \
            mako \
            pyyaml \
            packaging

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Android NDK
        shell: bash
        run: |
          set -euxo pipefail

          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            --licenses >/dev/null || true

          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "ndk;28.2.13676358"

          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/28.2.13676358" \
            >> "$GITHUB_ENV"

      - name: Clone Mesa
        shell: bash
        run: |
          set -euxo pipefail

          git clone \
            --filter=blob:none \
            https://gitlab.freedesktop.org/mesa/mesa.git \
            mesa

          cd mesa
          git checkout "${{ inputs.mesa_ref }}"
          git rev-parse HEAD | tee ../mesa-commit.txt

      - name: Apply optional patches
        shell: bash
        run: |
          set -euxo pipefail
          shopt -s nullglob

          patches=(patches/*.patch)

          if [ ${#patches[@]} -gt 0 ]; then
            for patch in "${patches[@]}"; do
              echo "Applying ${patch}"
              git -C mesa apply "../${patch}"
            done
          else
            echo "No custom patches. Building clean Eclipse R2."
          fi

      - name: Build Turnip for Android ARM64
        shell: bash
        env:
          API_LEVEL: "34"
          PLATFORM_SDK: "34"
        run: |
          set -euxo pipefail
          chmod +x scripts/build-turnip.sh
          scripts/build-turnip.sh

      - name: Package Eclipse R2
        shell: bash
        env:
          BUILD_NAME: "${{ inputs.build_name }}"
          MESA_REF: "${{ inputs.mesa_ref }}"
          RELEASE_NAME: "Turnip-MV-Eclipse-R2"
        run: |
          set -euxo pipefail
          chmod +x scripts/package-driver.sh
          scripts/package-driver.sh

      - name: Upload Eclipse R2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Turnip-MV-Eclipse-R2
          path: output/*
          if-no-files-found: error
          retention-days: 30

      - name: Upload logs if build fails
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Turnip-MV-Eclipse-R2-build-logs
          path: |
            build-android-aarch64/meson-logs/*
            mesa-commit.txt
          if-no-files-found: ignore
          retention-days: 7
